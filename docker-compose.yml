services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    volumes:
      - ./data/meili:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key}
      MEILI_ENV: development
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ./data/duckdb:/app/data/duckdb
      - ./data/dicts:/app/data/dicts
      - ./logs:/app/logs
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: python -m meme_detector serve
    restart: unless-stopped

  # 仅用于本地开发：直接跑 scout 任务
  scout:
    build: .
    profiles: ["tools"]
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ./data/duckdb:/app/data/duckdb
      - ./data/dicts:/app/data/dicts
    env_file:
      - .env
    command: python -m meme_detector scout
