services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    volumes:
      - ./data/meili:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key-1234}
      MEILI_ENV: development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 生产模式：完整部署 ──────────────────────────────────────
  app:
    build: .
    profiles: ["prod"]
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ./data/duckdb:/app/data/duckdb
      - ./data/dicts:/app/data/dicts
      - ./logs:/app/logs
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: python -m meme_detector serve
    restart: unless-stopped

  # ── 工具：手动触发 scout（开发用）──────────────────────────
  scout:
    build: .
    profiles: ["tools"]
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ./data/duckdb:/app/data/duckdb
      - ./data/dicts:/app/data/dicts
    env_file:
      - .env
    command: python -m meme_detector scout
