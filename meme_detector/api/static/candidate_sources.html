<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemeDetector 候选梗来源线索</title>
  <link rel="stylesheet" href="/admin-assets/admin.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="shell">
    <nav class="top-nav">
      <a class="nav-link" href="/admin">总览</a>
      <a class="nav-link" href="/admin/scout">Scout 原始数据</a>
      <a class="nav-link" href="/admin/miner">Miner 评论线索</a>
      <a class="nav-link active" href="/admin/candidates">候选梗队列</a>
      <a class="nav-link" href="/admin/conversations">Agent 对话</a>
    </nav>

    <header class="hero panel">
      <div>
        <p class="eyebrow">Candidate Sources</p>
        <h1>候选梗来源线索</h1>
        <p id="pageSubtitle" class="hero-copy">查看候选梗关联的视频引用和对应的 Miner 评论线索。</p>
      </div>
      <div class="hero-actions">
        <a class="secondary-button" href="/admin/candidates">返回候选列表</a>
        <button id="refreshButton" class="primary-button" type="button">刷新数据</button>
        <p id="lastUpdated" class="meta-text">最近刷新：--</p>
      </div>
    </header>

    <section class="panel">
      <div id="candidateSummary" class="conversation-detail empty-state">正在加载候选词来源线索...</div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <p class="section-kicker">Sources</p>
          <h2>关联视频与来源评论</h2>
        </div>
      </div>
      <div class="conversation-layout">
        <section class="panel">
          <div id="videoRefList" class="conversation-list"></div>
        </section>
        <section class="panel">
          <div id="sourceInsightList" class="conversation-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="/admin-assets/candidate_sources.js"></script>
</body>
</html>
