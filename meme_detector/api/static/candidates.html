<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemeDetector 候选梗队列</title>
  <link rel="stylesheet" href="/admin-assets/admin.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="shell">
    <nav class="top-nav">
      <a class="nav-link" href="/admin">总览</a>
      <a class="nav-link" href="/admin/scout">Scout 原始数据</a>
      <a class="nav-link" href="/admin/miner">Miner 评论线索</a>
      <a class="nav-link active" href="/admin/candidates">候选梗队列</a>
      <a class="nav-link" href="/admin/conversations">Agent 对话</a>
    </nav>

    <header class="hero panel">
      <div>
        <p class="eyebrow">Candidate Queue</p>
        <h1>候选梗队列</h1>
        <p class="hero-copy">分页查看全部候选梗的完整信息，包括状态、说明、评论样本和来源线索入口。</p>
      </div>
      <div class="hero-actions">
        <button id="refreshButton" class="primary-button" type="button">刷新列表</button>
        <p id="lastUpdated" class="meta-text">最近刷新：--</p>
      </div>
    </header>

    <section class="panel">
      <div class="section-head section-head-tight">
        <div>
          <p class="section-kicker">Queue Browser</p>
          <h2>候选梗分页列表</h2>
        </div>
        <div class="filters">
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="accepted">已接受</option>
            <option value="rejected">已拒绝</option>
          </select>
          <select id="pageSize">
            <option value="10">10 条 / 页</option>
            <option value="20" selected>20 条 / 页</option>
            <option value="50">50 条 / 页</option>
          </select>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="prevPage" class="secondary-button" type="button">上一页</button>
          <button id="nextPage" class="secondary-button" type="button">下一页</button>
        </div>
        <div id="pageSummary" class="page-summary">--</div>
        <div class="pager">
          <button id="deleteAllButton" class="danger-button" type="button">删除所有候选</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="wide-table">
          <thead>
            <tr>
              <th>词条</th>
              <th>状态</th>
              <th>新词</th>
              <th>分数</th>
              <th>发现时间</th>
              <th>说明</th>
              <th>评论样本</th>
              <th>来源线索</th>
            </tr>
          </thead>
          <tbody id="candidateRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/admin-assets/candidates.js"></script>
</body>
</html>
