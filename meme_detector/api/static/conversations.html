<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemeDetector Agent 对话</title>
  <link rel="stylesheet" href="/admin-assets/admin.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="shell">
    <nav class="top-nav">
      <a class="nav-link" href="/admin">总览</a>
      <a class="nav-link" href="/admin/candidates">候选梗队列</a>
      <a class="nav-link active" href="/admin/conversations">Agent 对话</a>
    </nav>

    <header class="hero panel">
      <div>
        <p class="eyebrow">Agent Conversations</p>
        <h1>Agent 对话记录</h1>
        <p class="hero-copy">查看 Researcher 对每个候选词的完整上下文、工具调用消息和最终输出。</p>
      </div>
      <div class="hero-actions">
        <button id="refreshButton" class="primary-button" type="button">刷新数据</button>
        <p id="lastUpdated" class="meta-text">最近刷新：--</p>
      </div>
    </header>

    <section class="panel">
      <div class="section-head section-head-tight">
        <div>
          <p class="section-kicker">Filters</p>
          <h2>对话检索</h2>
        </div>
        <div class="filters">
          <input id="runIdFilter" class="input-field" type="text" placeholder="运行记录 ID" />
          <input id="wordFilter" class="input-field" type="text" placeholder="词条关键字" />
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="success">成功</option>
            <option value="failed">失败</option>
            <option value="running">运行中</option>
          </select>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="applyFilter" class="secondary-button" type="button">应用筛选</button>
          <button id="prevPage" class="secondary-button" type="button">上一页</button>
          <button id="nextPage" class="secondary-button" type="button">下一页</button>
        </div>
        <div id="pageSummary" class="page-summary">--</div>
      </div>

      <div class="conversation-layout">
        <section class="panel">
          <div id="conversationList" class="conversation-list"></div>
        </section>
        <section class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Detail</p>
              <h2>对话详情</h2>
            </div>
          </div>
          <div id="conversationDetail" class="conversation-detail empty-state">选择左侧对话查看详情</div>
        </section>
      </div>
    </section>
  </main>

  <script src="/admin-assets/conversations.js"></script>
</body>
</html>
