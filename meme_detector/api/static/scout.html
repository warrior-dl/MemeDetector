<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemeDetector Scout 原始数据</title>
  <link rel="stylesheet" href="/admin-assets/admin.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="shell">
    <nav class="top-nav">
      <a class="nav-link" href="/admin">总览</a>
      <a class="nav-link active" href="/admin/scout">Scout 原始数据</a>
      <a class="nav-link" href="/admin/miner">Miner 评论线索</a>
      <a class="nav-link" href="/admin/candidates">候选梗队列</a>
      <a class="nav-link" href="/admin/conversations">Agent 对话</a>
    </nav>

    <header class="hero panel">
      <div>
        <p class="eyebrow">Scout Raw Snapshots</p>
        <h1>Scout 原始数据</h1>
        <p class="hero-copy">查看 Scout 采集并写入 DuckDB 的原始视频快照，用于排查采集结果与候选提取链路。</p>
      </div>
      <div class="hero-actions">
        <button id="refreshButton" class="primary-button" type="button">刷新数据</button>
        <p id="lastUpdated" class="meta-text">最近刷新：--</p>
      </div>
    </header>

    <section class="panel">
      <div class="section-head section-head-tight">
        <div>
          <p class="section-kicker">Filters</p>
          <h2>原始快照检索</h2>
        </div>
        <div class="filters">
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="pending">待提取</option>
            <option value="processed">已提取</option>
          </select>
          <input id="partitionFilter" class="input-field" type="text" placeholder="分区关键字" />
          <input id="keywordFilter" class="input-field" type="text" placeholder="标题 / 描述 / BVID" />
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="applyFilter" class="secondary-button" type="button">应用筛选</button>
          <button id="prevPage" class="secondary-button" type="button">上一页</button>
          <button id="nextPage" class="secondary-button" type="button">下一页</button>
        </div>
        <div id="pageSummary" class="page-summary">--</div>
      </div>

      <div class="conversation-layout">
        <section class="panel">
          <div id="snapshotList" class="conversation-list"></div>
        </section>
        <section class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Detail</p>
              <h2>快照详情</h2>
            </div>
          </div>
          <div id="snapshotDetail" class="conversation-detail empty-state">选择左侧快照查看详情</div>
        </section>
      </div>
    </section>
  </main>

  <script src="/admin-assets/scout.js"></script>
</body>
</html>
